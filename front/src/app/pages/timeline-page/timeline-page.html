<section class="min-w-0 space-y-4">
  <header class="rounded-3xl border border-white/10 bg-[#121216]/90 p-4 shadow-2xl sm:p-5">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="text-xs font-black uppercase tracking-[0.2em] text-zinc-500">
          Central Feed
        </p>

        <h1 class="mt-1 text-3xl font-black tracking-tight sm:text-4xl">
          Today in your clubs
        </h1>
      </div>

      <label class="flex items-center gap-2 rounded-2xl border border-white/10 bg-black/20 px-3 py-2 text-xs font-bold text-zinc-400">
        <span>Sort By</span>
        <select
          class="rounded-xl border border-white/10 bg-black/30 px-3 py-2 text-white outline-none"
          [value]="sortBy()"
          (change)="sortBy.set($any($event.target).value)"
        >
          <option value="date">Date</option>
          <option value="popularity">Popularity</option>
          <option value="replies">Replies</option>
          <option value="type">Type</option>
        </select>
      </label>
    </div>

    <div class="mt-5 flex items-center gap-3">
      <div class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-cyan-300 font-black text-black">
        J
      </div>

      <button
        type="button"
        class="min-w-0 flex-1 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3 text-left text-sm text-zinc-500 hover:border-white/20 hover:bg-white/[0.05]"
        (click)="openComposer()"
      >
        Share a log, question, or group call...
      </button>

      <button
        type="button"
        class="hidden rounded-2xl border border-white/10 px-4 py-3 text-sm font-black text-zinc-300 hover:bg-white/5 sm:block"
        (click)="openComposer()"
      >
        +
      </button>
    </div>
  </header>

  @if (isComposerOpen()) {
    <app-composer [open]="isComposerOpen()" (close)="closeComposer()"></app-composer>
  }

  @if (isLoading()) {
    <div class="rounded-3xl border border-white/10 bg-[#18181d] p-6 text-zinc-400">
      Loading timeline...
    </div>
  } @else if (error()) {
    <div class="rounded-3xl border border-red-400/30 bg-red-500/10 p-6 text-red-200">
      {{ error() }}
    </div>
  } @else {
    <div class="pb-8">
      @for (post of sortedPosts(); track post.id) {
        <app-post-card [post]="post" />
      }
    </div>
  }
</section>
