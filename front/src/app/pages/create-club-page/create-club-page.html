<main class="rally-scrollbar min-h-screen bg-[var(--rally-bg)] text-white">
  <div class="mx-auto w-full max-w-[980px] px-4 py-10">
    <header class="mb-6">
      <p class="text-xs font-black uppercase tracking-[0.2em] text-zinc-500">Create</p>
      <h1 class="mt-2 text-4xl font-black tracking-tight">New club</h1>
      <p class="mt-2 max-w-[70ch] text-sm font-semibold leading-7 text-zinc-400">
        Clubs are the core of Rally. Pick a strong name, a clean slug, and a theme color that pops.
      </p>
    </header>

    <section class="rounded-3xl border border-white/10 bg-[#121216]/90 p-6 shadow-2xl">
      <form class="space-y-4" (ngSubmit)="submit()">
        <label class="block">
          <span class="mb-1.5 block text-xs font-black uppercase tracking-wide text-zinc-500">Name</span>
          <input
            class="w-full rounded-2xl border border-white/10 bg-black/30 px-4 py-3 text-sm text-white outline-none placeholder:text-zinc-600 focus:border-white/20"
            type="text"
            name="name"
            [ngModel]="name()"
            (ngModelChange)="onNameChange($event)"
            placeholder="Speedrunning Lab"
            required
          />
        </label>

        <label class="block">
          <span class="mb-1.5 block text-xs font-black uppercase tracking-wide text-zinc-500">Slug</span>
          <input
            class="w-full rounded-2xl border border-white/10 bg-black/30 px-4 py-3 text-sm text-white outline-none placeholder:text-zinc-600 focus:border-white/20"
            type="text"
            name="slug"
            [ngModel]="slug()"
            (ngModelChange)="onSlugChange($event)"
            placeholder="speedrunning-lab"
            required
          />
          <p class="mt-2 text-xs font-semibold text-zinc-600">
            Used in links: <span class="font-black text-zinc-400">/clubs/{{ slug() || 'your-slug' }}</span>
          </p>
        </label>

        <label class="block">
          <span class="mb-1.5 block text-xs font-black uppercase tracking-wide text-zinc-500">Description</span>
          <textarea
            class="min-h-[120px] w-full resize-none rounded-2xl border border-white/10 bg-black/30 px-4 py-3 text-sm leading-6 text-white outline-none placeholder:text-zinc-600 focus:border-white/20"
            name="description"
            [ngModel]="description()"
            (ngModelChange)="description.set($event)"
            placeholder="What is this club about?"
          ></textarea>
        </label>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <label class="block">
            <span class="mb-1.5 block text-xs font-black uppercase tracking-wide text-zinc-500">Theme color</span>
            <input
              class="h-12 w-full rounded-2xl border border-white/10 bg-black/30 px-3 py-2"
              type="color"
              name="accent_color"
              [ngModel]="accentColor()"
              (ngModelChange)="accentColor.set($event)"
            />
          </label>

          <div class="rounded-3xl border border-white/10 bg-white/[0.03] p-4">
            <p class="text-xs font-black uppercase tracking-wide text-zinc-500">Preview</p>
            <div class="mt-3 flex items-center gap-3">
              <span class="h-3 w-3 rounded-full" [style.background]="accentColor()"></span>
              <p class="truncate text-sm font-black">{{ name() || 'New club' }}</p>
            </div>
          </div>
        </div>

        @if (error()) {
          <div class="rounded-2xl border border-red-400/30 bg-red-500/10 p-4 text-sm font-semibold text-red-200">
            {{ error() }}
          </div>
        }

        <div class="flex items-center justify-end gap-3 pt-2">
          <button
            type="button"
            class="rounded-2xl border border-white/10 px-4 py-3 text-sm font-black text-zinc-200 hover:bg-white/5"
            (click)="router.navigateByUrl('/timeline')"
            [disabled]="isSubmitting()"
          >
            Cancel
          </button>

          <button
            type="submit"
            class="rounded-2xl bg-white px-5 py-3 text-sm font-black text-black shadow-lg disabled:cursor-not-allowed disabled:opacity-60"
            [disabled]="isSubmitting()"
          >
            @if (isSubmitting()) { Creating... } @else { Create club }
          </button>
        </div>
      </form>
    </section>
  </div>
</main>
