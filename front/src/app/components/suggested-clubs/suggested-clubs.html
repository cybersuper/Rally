@if (isLoading()) {
  <div class="space-y-3">
    <app-club-skeleton />
    <app-club-skeleton />
    <app-club-skeleton />
  </div>
} @else {
  <div class="space-y-3">
    @for (club of clubs(); track club.id) {
      <a
        class="block rounded-2xl border border-white/10 bg-white/[0.04] p-4 shadow-2xl transition hover:bg-white/[0.07]"
        [routerLink]="['/clubs', club.slug]"
      >
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <p class="truncate text-sm font-black text-white">{{ club.name }}</p>
            @if (club.description) {
              <p class="mt-1 line-clamp-2 text-xs font-semibold text-zinc-500">{{ club.description }}</p>
            }
          </div>

          <span class="mt-0.5 h-3 w-3 shrink-0 rounded-full" [style.background]="club.accent_color"></span>
        </div>

        <div class="mt-3 flex items-center justify-between gap-3">
          <p class="text-xs font-bold text-zinc-500">{{ club.members_count }} members</p>
          <span class="rounded-xl border border-white/10 px-3 py-2 text-xs font-black text-zinc-200">View</span>
        </div>
      </a>
    } @empty {
      <div class="rounded-2xl border border-white/10 bg-white/[0.04] p-4 text-sm font-semibold text-zinc-500">
        No suggestions yet.
      </div>
    }
  </div>
}
